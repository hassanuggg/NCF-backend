<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCF Admin Signup</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <img src="/images/Logo%201.png" class="logo" alt="Nanyoni Charity Foundation Logo">
        <h1>Nanyoni Charity Foundation</h1>
        <h2>Create an admin account</h2>
        <form id="signupForm">
            <input id="signupEmail" type="email" placeholder="Email Address" required>
            <input id="signupPassword" type="password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <p>Already have an account? <a href="/login">Login</a></p>
        <p>Developed by Hussmax Tech</p>
    </div>
    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
    <script src="js/auth.js"></script>
</body>
</html>
